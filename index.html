<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Google Tag Manager -->

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],

    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-PZKLWSRX');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Renacer | Leonor Alicia Ardohain</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="libro.jpeg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        
        :root {
            --accent: #d4af37; 
            --accent-hover: #f3e5ab; 
            --bg-deep: #071016; 
            --bg-card: #0b1a24; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        html { scroll-behavior: smooth; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #112a3b 0%, var(--bg-deep) 70%);
        }

        .font-brand { font-family: 'Cinzel', serif; }
        .font-serif { font-family: 'Playfair Display', serif; }

        .text-gold-glow {
            color: var(--accent);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        
        .glass-nav {
            background: rgba(7, 16, 22, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* --- TARJETAS MÁS GRANDES Y ALTAS --- */
        .card-wrapper {
            position: relative;
            height: 44rem; 
            z-index: 10;
            perspective: 1200px;
            cursor: pointer;
            width: 100%;
            max-width: 450px; 
            margin: 0 auto;
        }
        
        .product-card {
            background: var(--bg-card);
            border: 1px solid rgba(212, 175, 55, 0.15);
            width: 100%;
            height: 100%;
            position: absolute;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 4px; 
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* --- CONTENEDOR DE IMAGEN (GIF SIEMPRE) --- */
        .img-container {
            height: 32rem; 
            width: 100%;
            position: relative;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 1.2s ease;
        }

        /* --- CONTENIDO DE TEXTO --- */
        .card-content {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            background: linear-gradient(to bottom, var(--bg-card), #050c12);
        }
        
        .hidden-details {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        /* --- HOVER EFFECTS --- */
        @media (hover: hover) {
            .card-wrapper:hover { z-index: 50; }
            .card-wrapper:hover .product-card {
                transform: translateY(-15px) scale(1.02);
                box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.2);
                border-color: var(--accent);
                height: auto;
                min-height: 100%;
            }
            .card-wrapper:hover .img-container img { transform: scale(1.08); }
            .card-wrapper:hover .hidden-details {
                max-height: 500px;
                opacity: 1;
                margin-top: 1.5rem;
            }
        }

        /* Celulares */
        .card-wrapper.active { z-index: 60; }
        .card-wrapper.active .product-card {
            transform: translateY(-10px);
            height: auto;
            min-height: 100%;
            border-color: var(--accent);
        }
        .card-wrapper.active .hidden-details {
            max-height: 600px;
            opacity: 1;
            margin-top: 1.5rem;
        }

        /* BOTONES */
        .btn-action {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.7rem;
            font-weight: 800;
        }
        .btn-action:hover {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* ZOOM */
        #zoom-modal {
            position: fixed;
            inset: 0;
            background: rgba(4, 10, 14, 0.98);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(10px);
        }
        #zoom-modal.open { opacity: 1; pointer-events: auto; }

        #scroll-up {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            border: 1px solid var(--accent);
            color: var(--accent);
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.4s;
            z-index: 80;
            background: rgba(11, 26, 36, 0.8);
            opacity: 0;
        }
        #scroll-up.show { opacity: 1; }

        /* INPUT EMAIL */
        .input-elegant {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            transition: all 0.3s ease;
        }
        .input-elegant:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .input-elegant::placeholder {
            color: rgba(255,255,255,0.3);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
        }

        @media (max-width: 640px) {
            .card-wrapper { height: 38rem; }
            .img-container { height: 26rem; }
        }
    </style>
</head>
<body class="antialiased">
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PZKLWSRX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    
    <div id="zoom-modal" onclick="this.classList.remove('open')">
        <button class="absolute top-5 right-5 text-[#d4af37] text-4xl">&times;</button>
        <img id="zoom-img" class="max-w-[90vw] max-h-[90vh] object-contain shadow-2xl border border-yellow-600/20" src="">
    </div>

    <nav class="glass-nav sticky top-0 z-[100] py-5 px-8">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="cursor-pointer" onclick="window.scrollTo({top:0, behavior:'smooth'})">
                <h1 class="text-3xl font-brand tracking-[0.2em] text-white leading-none">RENACER</h1>
                <h2 class="text-[9px] font-brand tracking-[0.4em] text-gold-glow uppercase font-bold mt-2">Leonor Alicia Ardohain</h2>
            </div>

            <button onclick="toggleCart()" class="relative group px-6 py-2 border border-yellow-600/30 text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition-all">
                <span class="text-[10px] font-brand font-black uppercase tracking-[0.2em] flex items-center gap-3">
                    <i class="fas fa-shopping-bag"></i> Mi Compra
                    <span id="cart-count" class="ml-2 bg-[#d4af37] group-hover:bg-black group-hover:text-[#d4af37] text-black w-5 h-5 flex items-center justify-center rounded-full text-[9px]">0</span>
                </span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-20 flex-grow w-full">
        <header class="mb-20 text-center">
            <h2 class="text-4xl md:text-6xl font-serif text-white mb-6 italic tracking-tight">Elegancia Literaria</h2>
            <div class="w-24 h-px bg-[#d4af37] mx-auto mb-6"></div>
            <p class="text-slate-400 font-light text-sm md:text-base max-w-xl mx-auto leading-relaxed">
                "Habitar la vida sin máscaras es el primer paso hacia el verdadero renacimiento del alma."
            </p>
        </header>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-20 items-start">
            <!-- Inyectado por JS -->
        </div>
    </main>

    <div id="scroll-up" onclick="window.scrollTo({top:0, behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <footer class="bg-[#03080c] py-20 px-8 border-t border-yellow-900/20">
        <div class="max-w-4xl mx-auto text-center">
            <h3 class="text-2xl font-brand tracking-[0.3em] text-white mb-2">RENACER</h3>
            <h4 class="text-[10px] font-brand tracking-[0.4em] text-gold-glow font-bold mb-10">LEONOR ALICIA ARDOHAIN</h4>
            
            <div class="flex justify-center space-x-10 mb-12">
                <!-- Links de Instagram y Email actualizados -->
                <a href="https://www.instagram.com/" target="_blank" class="text-slate-500 hover:text-[#d4af37] transition-all text-xl"><i class="fab fa-instagram"></i></a>
                <a href="mailto:leonor.consultas@gmail.com?body=Hola%2C%20te%20contacto%20desde%20la%20pagina%20por%20la%20compra%20de%20renacer." class="text-slate-500 hover:text-[#d4af37] transition-all text-xl"><i class="fas fa-envelope"></i></a>
            </div>

            <p class="text-[9px] text-slate-600 uppercase tracking-[0.3em] font-brand">
                Argentina • 2026 • Distribución Exclusiva
            </p>
        </div>
    </footer>

    <!-- CART SIDEBAR -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[110] hidden" onclick="toggleCart()"></div>
    <aside id="cart-sidebar" class="fixed right-0 top-0 h-full w-full max-w-md bg-[#071016] z-[120] translate-x-full transition-transform duration-500 border-l border-yellow-900/30 flex flex-col">
        <div class="p-10 border-b border-white/5 flex justify-between items-center">
            <h2 class="text-xl font-brand text-white tracking-[0.3em]">CARRITO</h2>
            <button onclick="toggleCart()" class="text-[#d4af37] text-4xl">&times;</button>
        </div>
        
        <div id="cart-content" class="flex-grow overflow-y-auto p-10 space-y-8"></div>
        
        <!-- Zona de Checkout con Email -->
        <div class="p-10 bg-[#040a0d] border-t border-white/5">
            <div class="flex justify-between items-center mb-6">
                <span class="text-slate-500 text-[10px] font-brand tracking-widest uppercase">Total Estimado</span>
                <span id="cart-total" class="text-3xl font-serif text-[#d4af37]">$ 0</span>
            </div>
            
            <!-- Campo de Email requerido -->
            <div id="checkout-form" class="hidden mb-6">
                <label for="buyer-email" class="block text-[10px] font-brand text-slate-400 tracking-widest uppercase mb-2">Ingresa tu email para continuar</label>
                <input type="email" id="buyer-email" placeholder="ejemplo@correo.com" class="input-elegant w-full px-4 py-3 text-sm mb-1" required>
                <p id="email-error" class="text-red-500 text-[10px] font-brand tracking-wider hidden uppercase">Por favor ingresa un email válido.</p>
            </div>

            <button onclick="sendToWhatsApp()" class="btn-action w-full py-5 text-sm flex items-center justify-center gap-4">
                <i class="fab fa-whatsapp text-lg"></i> Finalizar Pedido
            </button>
        </div>
    </aside>

    <script>
        // Número de WhatsApp actualizado
        const WHATSAPP_PHONE = "5491140915117"; 
        
        const products = [
            {
                id: 1,
                nombre: "Renacer",
                formato: "Edición Impresa",
                infoCorta: "Tapa blanda, papel premium",
                descripcion: "Una obra física para sentir el peso de las palabras. Encuadernación de lujo con detalles en relieve.",
                precio: 18500,
                img: "libro.gif"
            },
            {
                id: 2,
                nombre: "Renacer",
                formato: "Edición Digital",
                infoCorta: "Formato ePub y PDF",
                descripcion: "Lleva la sabiduría de Leonor en todos tus dispositivos. Entrega inmediata a tu correo electrónico.",
                precio: 8900,
                img: "libro.gif"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('renacer_cart_v2')) || [];

        window.onload = () => {
            displayProducts(products);
            updateCartUI();
        };

        function displayProducts(items) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = items.map(p => `
                <div class="card-wrapper" id="wrapper-${p.id}" onclick="toggleActive(this)">
                    <div class="product-card">
                        <div class="img-container" onclick="openZoom('${p.img}', event)">
                            <img src="${p.img}" alt="${p.nombre}">
                        </div>

                        <div class="card-content">
                            <div class="mb-4">
                                <h3 class="text-white font-brand text-3xl tracking-widest">${p.nombre}</h3>
                                <p class="text-[#d4af37] font-serif italic text-base mt-2">${p.formato}</p>
                            </div>
                            
                            <p class="text-[10px] font-brand text-slate-500 uppercase tracking-widest active-hide mb-2 group-hover:hidden">
                                ${p.infoCorta}
                            </p>

                            <div class="hidden-details">
                                <p class="text-sm text-slate-400 leading-relaxed font-serif italic mb-8 border-l border-yellow-600/30 pl-6">
                                    "${p.descripcion}"
                                </p>
                                
                                <div class="flex items-center justify-between">
                                    <span class="text-white font-serif text-3xl">$${p.precio.toLocaleString('es-AR')}</span>
                                    <button onclick="addToCart(${p.id}, event)" class="btn-action px-8 py-3">
                                        Agregar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleActive(el) {
            const wasActive = el.classList.contains('active');
            document.querySelectorAll('.card-wrapper.active').forEach(c => c.classList.remove('active'));
            if (!wasActive) el.classList.add('active');
        }

        function openZoom(src, e) {
            if (e) e.stopPropagation();
            const modal = document.getElementById('zoom-modal');
            const img = document.getElementById('zoom-img');
            img.src = src;
            modal.classList.add('open');
        }

        function addToCart(id, e) {
            e.stopPropagation();
            const p = products.find(x => x.id === id);
            const exist = cart.find(x => x.id === id);
            if (exist) exist.qty++; else cart.push({...p, qty: 1});
            saveCart();
            updateCartUI();
            
            // Si el carrito estaba cerrado, lo abrimos
            const sidebar = document.getElementById('cart-sidebar');
            if(sidebar.classList.contains('translate-x-full')) {
                toggleCart();
            }
        }

        function saveCart() { localStorage.setItem('renacer_cart_v2', JSON.stringify(cart)); }

        function updateCartUI() {
            const count = document.getElementById('cart-count');
            const content = document.getElementById('cart-content');
            const totalDisplay = document.getElementById('cart-total');
            const checkoutForm = document.getElementById('checkout-form');
            
            const totalQty = cart.reduce((acc, i) => acc + i.qty, 0);
            count.innerText = totalQty;
            
            let total = 0;
            if (cart.length === 0) {
                content.innerHTML = `<p class="text-slate-600 font-serif italic text-center py-20">El carrito está vacío.</p>`;
                checkoutForm.classList.add('hidden'); // Ocultar input si no hay items
            } else {
                checkoutForm.classList.remove('hidden'); // Mostrar input si hay items
                content.innerHTML = cart.map(item => {
                    total += item.precio * item.qty;
                    return `
                        <div class="flex items-center gap-6 group">
                            <img src="${item.img}" class="w-20 h-28 object-cover border border-white/5 shadow-xl">
                            <div class="flex-grow">
                                <h4 class="text-white font-brand tracking-widest text-xs uppercase">${item.nombre}</h4>
                                <p class="text-slate-500 text-[10px] mt-1 italic font-serif">${item.formato}</p>
                                <p class="text-[#d4af37] text-sm mt-3 font-serif">${item.qty} x $${item.precio.toLocaleString()}</p>
                            </div>
                            <button onclick="removeCart(${item.id})" class="text-slate-700 hover:text-[#d4af37] transition-colors"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                }).join('');
            }
            totalDisplay.innerText = `$ ${total.toLocaleString('es-AR')}`;
        }

        function removeCart(id) {
            cart = cart.filter(i => i.id !== id);
            saveCart();
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function sendToWhatsApp() {
            if (cart.length === 0) return;
            
            // Validación de Email
            const emailInput = document.getElementById('buyer-email');
            const emailError = document.getElementById('email-error');
            const email = emailInput.value.trim();
            
            // Expresión regular simple para validar formato de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (!email || !emailRegex.test(email)) {
                emailError.classList.remove('hidden');
                emailInput.focus();
                return;
            }
            
            emailError.classList.add('hidden');

            // Armado del mensaje si el email es válido
            let total = 0;
            let msg = "*ORDEN DE COMPRA - RENACER*%0A%0A";
            cart.forEach(i => {
                msg += `📖 *${i.nombre}* (${i.formato}) x${i.qty}%0A`;
                total += (i.precio * i.qty);
            });
            msg += `%0A💰 *TOTAL: $${total.toLocaleString('es-AR')}*%0A`;
            msg += `✉️ *Mi email es:* ${email}%0A%0A_Hola Leonor, quiero coordinar mi pedido._`;
            
            window.open(`https://wa.me/${WHATSAPP_PHONE}?text=${msg}`, '_blank');
        }

        window.onscroll = () => {
            const btn = document.getElementById('scroll-up');
            if (window.scrollY > 500) btn.classList.add('show'); else btn.classList.remove('show');
        };
    </script>
</body>
</html>
